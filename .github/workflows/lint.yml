name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Lint sidecar Dockerfiles
        run: |
          for f in sidecars/*.dockerfile; do
            echo "Linting $f"
            docker run --rm -i hadolint/hadolint hadolint --ignore DL3061 --ignore DL3008 --ignore DL3016 - < "$f"
          done
